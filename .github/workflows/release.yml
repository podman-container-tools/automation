name: Create Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build-images:
    uses: ./.github/workflows/build_images.yml

  build-container-images:
    uses: ./.github/workflows/build_container_images.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      push: true
      tag: ${{ github.ref_name }}

  create-release:
    # use a larger runner in hope of better network speeds
    runs-on: cncf-ubuntu-16-64-x86
    needs: [build-images, build-container-images]
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout (for upload script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload images to OCI Object Storage via PAR
        env:
          OCI_PAR_URL: ${{ secrets.OCI_PAR_URL }}
          VERSION: ${{ github.ref_name }}
        run: ./scripts/upload-to-oci-par.sh artifacts/*.zst

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh --repo "$REPO" release create "$VERSION" -t "$VERSION" --verify-tag
